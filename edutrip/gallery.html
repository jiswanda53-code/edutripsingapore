<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activity Gallery</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d4a4a;
    }

    /* NAVBAR */
    .navbar {
        display: flex;
        width: 100%;
    }

.nav-item {
    flex: 1;
    text-align: center;
    padding: 30px 0;   /* increased from 20px → 30px */
    background: #e5c72a;
    font-weight: bold;
    font-size: 24px;   /* slightly bigger text (optional) */
    border-right: 3px solid black;
    cursor: pointer;
    color: #1f4f4f;
}

    .nav-item:last-child {
        border-right: none;
    }

    .nav-item:hover {
        background: #d4b81f;
    }

    /* TITLE */
    .title {
        text-align: center;
        padding: 40px 0 10px 0;
        font-size: 70px;
        font-weight: bold;
        color: #d4b81f;
    }

    /* GALLERY */
    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
        padding: 30px 60px 60px 60px;
    }

    .box {
        width: 100%;
        height: 180px;
        background: #d8d98b;
        overflow: hidden;
    }

    .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* FOOTER */
    .footer {
        text-align: center;
        padding: 15px;
        background: #222;
        color: white;
        font-size: 14px;
    }
    body {
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-item" onclick="location.href='home.html'">HOME</div>
    <div class="nav-item" onclick="location.href='editors.html'">EDITOR'S GALLERY</div>
    <div class="nav-item" onclick="location.href='dailyschedule.html'">DAILY SCHEDULE</div>
    <div class="nav-item" onclick="location.href='freetime.html'">FREE TIME</div>
    <div class="nav-item" onclick="location.href='about.html'">ABOUT US</div>
</div>

<!-- TITLE -->
<div class="title">ACTIVITY GALLERY</div>

<!-- GALLERY -->
<div class="gallery">
    <div class="box"><img src="img1.jpeg"></div>
    <div class="box"><img src="img2.jpeg"></div>
    <div class="box"><img src="img3.jpeg"></div>

    <div class="box"><img src="img4.jpeg"></div>
    <div class="box"><img src="img5.jpeg"></div>
    <div class="box"><img src="img6.jpeg"></div>

    <div class="box"><img src="img7.jpeg"></div>
    <div class="box"><img src="img8.jpeg"></div>
    <div class="box"><img src="img9.jpeg"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    by: William Arthur
</div>

</body>
</html>
