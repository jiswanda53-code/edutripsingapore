    .hero-logo {
      position: absolute;
      top: 20px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .logo-text {
      font-weight: 700;
      font-size: 13px;
      color: #f5d000;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .logo-text span {
      display: block;
      font-weight: 400;
      font-size: 11px;
      font-style: italic;
      color: rgba(245,208,0,0.7);
    }

    .hero h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(56px, 10vw, 112px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .hero p {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      margin-top: 8px;
    }

    .hero-btn {
      display: inline-block;
      margin-top: 28px;
      background: #f5d000;
      color: #0d4a4a;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px 40px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }

    .hero-btn:hover { background: #ffe033; }

    .nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #f5d000;
    }

    .nav a {
      display: block;
      text-align: center;
      padding: 22px 12px;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(20px, 3vw, 36px);
      color: #0d4a4a;
      letter-spacing: 0.06em;
      text-decoration: none;
      border-right: 2px solid rgba(13,74,74,0.2);
    }

    .nav a:last-child { border-right: none; }
    .nav a:hover { background: #0d4a4a; color: #f5d000; }

        .title {
        text-align: center;
        padding: 40px 0 10px 0;
        font-size: 70px;
        font-weight: bold;
    }

    /* GALLERY */
    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 2fr);
        gap: 20px;
        padding: 30px 60px 60px 60px;
    }

    .box {
        width: 100%;
        height: 180px;
        background: #d8d98b;
        overflow: hidden;
    }

    .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    body {
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
button {
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.1);
  background-color: #ffcc00;
}
  </style>
</head>
<script>
const reveals = document.querySelectorAll(".reveal");

window.addEventListener("scroll", () => {
  reveals.forEach((el) => {
    const top = el.getBoundingClientRect().top;
    const windowHeight = window.innerHeight;

    if (top < windowHeight - 50) {
      el.classList.add("active");
    }
  });
});
</script>
